<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Dashboard Bembos</title><link rel="stylesheet" href="/styles.css"></head><body>
<header><strong>BEMBOS</strong><nav><a href="/">Inicio</a><a href="/scanner">Lector QR</a></nav></header>
<main><section class="card"><span class="eyebrow">Control de produccion</span><h1>Dashboard de pedidos</h1><p class="subtitle">Cambia pedidos a listos, notifica al cliente y supervisa las entregas.</p><label>IOT_DEVICE_API_KEY</label><div class="secret-row"><input id="key" type="password" placeholder="La misma clave de secrets.h"><button id="toggleKey" class="secret-toggle" type="button">Mostrar</button></div><div id="message" class="status idle">Ingresa la clave para administrar pedidos.</div>
<div class="metrics"><div class="metric"><b id="pc">0</b>Pendientes</div><div class="metric"><b id="dc">0</b>Entregados</div><div class="metric"><b id="tc">0</b>Total</div></div>
<div class="columns"><div class="column"><h2>Pendientes</h2><div id="pending" class="empty">Sin datos</div></div><div class="column"><h2>Entregados</h2><div id="delivered" class="empty">Sin datos</div></div></div></section></main>
<script>
const API='https://triumphant-benevolence-production-124d.up.railway.app',key=document.getElementById('key'),msg=document.getElementById('message'),pc=document.getElementById('pc'),dc=document.getElementById('dc'),tc=document.getElementById('tc'),pending=document.getElementById('pending'),delivered=document.getElementById('delivered');key.value=localStorage.getItem('bembosDeviceKey')||'';key.oninput=()=>{localStorage.setItem('bembosDeviceKey',key.value.trim());load()};document.getElementById('toggleKey').onclick=()=>{const show=key.type==='password';key.type=show?'text':'password';document.getElementById('toggleKey').textContent=show?'Ocultar':'Mostrar'};
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function card(o,done){const products=o.productos.map(p=>p.cantidad+' x '+p.nombre).join(', '),button=!done&&o.estado==='En preparacion'?'<button onclick="ready(\''+o.id+'\')">Marcar listo para recoger</button>':'';return '<article class="order '+(done?'delivered':'')+'"><div class="order-head"><b>#'+esc(o.numeroPedido)+'</b><span class="badge">'+esc(o.estado)+'</span></div><div class="detail">'+esc(products)+'</div><div class="detail">'+esc(o.tiendaRecojo)+' · S/ '+Number(o.total).toFixed(2)+'</div>'+button+'</article>'}
async function load(silent=false){if(!key.value.trim())return;try{const r=await fetch(API+'/iot/dashboard',{headers:{'X-Device-Key':key.value.trim()}}),d=await r.json();if(!r.ok)throw Error(d.message);pc.textContent=d.summary.pending;dc.textContent=d.summary.delivered;tc.textContent=d.summary.total;pending.innerHTML=d.pending.length?d.pending.map(o=>card(o,false)).join(''):'<div class="empty">No hay pendientes.</div>';delivered.innerHTML=d.delivered.length?d.delivered.map(o=>card(o,true)).join(''):'<div class="empty">No hay entregados.</div>';if(!silent){msg.className='status ok';msg.textContent='Dashboard actualizado.'}}catch(e){msg.className='status error';msg.textContent=e.message}}
async function ready(id){msg.className='status idle';msg.textContent='Actualizando pedido y enviando notificación...';try{const r=await fetch(API+'/iot/orders/'+id+'/ready',{method:'POST',headers:{'X-Device-Key':key.value.trim()} }),d=await r.json();if(!r.ok)throw Error(d.message);await load(true);if(d.notification.sent){msg.className='status ok';msg.textContent='Pedido listo. Notificación push enviada.'}else{msg.className='status warning';msg.textContent='Pedido listo, pero push no enviado: '+(d.notification.reason||'sin token')}}catch(e){msg.className='status error';msg.textContent=e.message}}
load();setInterval(load,3000);
</script></body></html>
