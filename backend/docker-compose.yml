services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      ORDERS_SERVICE_URL: http://orders-service:3002
      TRACKING_SERVICE_URL: http://tracking-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      - auth-service
      - orders-service
      - tracking-service
      - notification-service
    networks:
      - bembos-network
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: ${AUTH_MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    networks:
      - bembos-network
    restart: unless-stopped

  orders-service:
    build: ./orders-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: ${ORDERS_MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      IOT_DEVICE_API_KEY: ${IOT_DEVICE_API_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    networks:
      - bembos-network
    restart: unless-stopped

  tracking-service:
    build: ./tracking-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGODB_URI: ${TRACKING_MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      ORDERS_SERVICE_URL: http://orders-service:3002
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      LOCATION_TTL_SECONDS: ${LOCATION_TTL_SECONDS:-604800}
    networks:
      - bembos-network
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGODB_URI: ${NOTIFICATION_MONGODB_URI}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
    networks:
      - bembos-network
    restart: unless-stopped

networks:
  bembos-network:
    driver: bridge

